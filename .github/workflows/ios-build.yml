name: iOS Build (Xcode 16 · LiDAR)

on:
  push:
    branches: [main]
  workflow_dispatch:          # también se puede lanzar manualmente desde GitHub

jobs:
  build-ios:
    name: Build & Sign iOS App
    runs-on: macos-15         # macOS 15 Sequoia → Xcode 16 incluido

    steps:
      # 1 — Código fuente
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3 — Dependencias npm
      - name: Install dependencies
        run: npm ci

      # 4 — Build web (Vite)
      - name: Build web app
        run: npm run build

      # 5 — Sincronizar Capacitor → iOS
      - name: Capacitor sync
        run: npx cap sync ios

      # 6 — Xcode version
      - name: Show Xcode version
        run: xcodebuild -version

      # 7 — Importar certificado de firma (cuando esté configurado)
      - name: Import signing certificate
        if: ${{ secrets.CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: temporal123
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # 8 — Importar perfil de aprovisionamiento
      - name: Import provisioning profile
        if: ${{ secrets.PROVISIONING_PROFILE_BASE64 != '' }}
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # 9a — Build FIRMADO (cuando hay certificados configurados)
      - name: Build iOS — Signed
        if: ${{ secrets.CERTIFICATE_BASE64 != '' }}
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}"

      # 9b — Build SIN FIRMA (siempre funciona, prueba la compilación)
      - name: Build iOS — Unsigned (test compile)
        if: ${{ secrets.CERTIFICATE_BASE64 == '' }}
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      # 10 — Exportar .ipa (solo si hay certificados)
      - name: Export .ipa
        if: ${{ secrets.CERTIFICATE_BASE64 != '' }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      # 11 — Subir .ipa como artefacto descargable
      - name: Upload .ipa artifact
        if: ${{ secrets.CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: mi-render-ios
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 7
