name: iOS Build — mi-render

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        default: 'Release'
        type: choice
        options: [Release, Debug]

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Resolve Swift packages
        working-directory: ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath ./SourcePackages

      - name: Build iOS app
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration ${{ inputs.configuration || 'Release' }} \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            -clonedSourcePackagesDirPath ./SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.zerbitecni.mirender \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Create .ipa
        working-directory: ios/App
        run: |
          APP_PATH=$(find DerivedData -name "*.app" -not -path "*/Test*.app" | head -1)
          echo "Found .app: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r mi-render.ipa Payload/
          rm -rf Payload
          ls -lh mi-render.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-render-ios-build-${{ github.run_number }}
          path: ios/App/mi-render.ipa
          retention-days: 30

      - name: Build summary
        run: |
          echo "## iOS Build completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Config:** ${{ inputs.configuration || 'Release' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artefacto:** mi-render-ios-build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
