name: iOS Build (Xcode 16)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build iOS for device (unsigned)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create .ipa from archive
        run: |
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" \
            "$RUNNER_TEMP/ipa/Payload/"
          cd $RUNNER_TEMP/ipa
          zip -r $RUNNER_TEMP/mi-render.ipa Payload
          echo "IPA created: $(du -sh $RUNNER_TEMP/mi-render.ipa)"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-render-ios
          path: ${{ runner.temp }}/mi-render.ipa
          retention-days: 14
