name: iOS Build — mi-render

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        default: 'Debug'
        type: choice
        options: [Debug, Release]

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available | grep "iPhone 15" || true

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Resolve Swift packages
        working-directory: ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace App.xcworkspace \
            -scheme App \
            -clonedSourcePackagesDirPath ./SourcePackages

      - name: Build iOS app
        run: |
          set -o pipefail && xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration ${{ inputs.configuration || 'Debug' }} \
            -clonedSourcePackagesDirPath ios/App/SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            clean build 2>&1 | xcpretty

      - name: Create .ipa
        working-directory: ios/App
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" \
            -not -path "*/Test*.app" | head -1)
          echo "Found .app: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r mi-render.ipa Payload/
          rm -rf Payload
          ls -lh mi-render.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-render-ios-build-${{ github.run_number }}
          path: ios/App/mi-render.ipa
          retention-days: 30

      - name: Build summary
        run: |
          echo "## iOS Build completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Config:** ${{ inputs.configuration || 'Debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artefacto:** mi-render-ios-build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
