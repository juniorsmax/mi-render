name: iOS Build — mi-render

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        default: 'Release'
        type: choice
        options: [Release, Debug]

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Resolve Swift packages
        working-directory: ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath ./SourcePackages

      - name: List schemes (debug)
        working-directory: ios/App
        run: |
          xcodebuild -list -project App.xcodeproj || true

      - name: Archive iOS app
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            archive \
            -archivePath build/App.xcarchive \
            -clonedSourcePackagesDirPath ./SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath ios/App/build

      - name: Locate and rename IPA
        working-directory: ios/App
        run: |
          IPA=$(find build -name "*.ipa" | head -1)
          echo "Found IPA: $IPA"
          cp "$IPA" mi-render.ipa
          ls -lh mi-render.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-render-ios-build-${{ github.run_number }}
          path: ios/App/mi-render.ipa
          retention-days: 30

      - name: Build summary
        run: |
          echo "## iOS Build completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SDK:** iphoneos (dispositivo físico)" >> $GITHUB_STEP_SUMMARY
          echo "- **Artefacto:** mi-render-ios-build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
